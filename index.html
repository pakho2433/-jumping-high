<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>星空熊抱大冒險</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090526;color:white;font-family:"Microsoft JhengHei",sans-serif}canvas{display:block}.hide{display:none!important}
.panel{background:rgba(17,10,59,.82);border:1px solid rgba(255,255,255,.28);box-shadow:0 12px 45px #0008,inset 0 0 25px #8f6cff22;backdrop-filter:blur(10px);border-radius:24px}
#start,#end{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#44349d88,#07031ddd)}
.card{width:min(560px,92vw);padding:34px;text-align:center}.card h1{margin:0 0 8px;font-size:clamp(30px,6vw,54px);color:#ffe986;text-shadow:0 0 20px #ffba50}.card p{line-height:1.7;color:#e8e4ff}.card input{width:100%;padding:15px 18px;border-radius:15px;border:2px solid #8a74e8;background:#100939;color:#fff;font-size:18px;outline:none}.card button,#retry{margin-top:16px;padding:13px 28px;border:0;border-radius:999px;background:linear-gradient(135deg,#ffe86a,#ff8acb);color:#2a1248;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 8px 25px #ff83c755}.small{font-size:13px;opacity:.8}
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}.top{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:10px;justify-content:space-between;align-items:flex-start}.pill{padding:10px 15px;border-radius:18px;background:#160d4dcc;border:1px solid #ffffff38;font-weight:800}.hearts{color:#ff679a;letter-spacing:2px}.progress{min-width:220px;text-align:center}.bar{height:7px;background:#352673;border-radius:8px;margin-top:5px;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#5eeaff,#ffe46d);transition:.3s}
#question{position:absolute;top:70px;left:50%;transform:translateX(-50%);width:min(760px,94vw);padding:14px 20px;border-radius:20px;background:#130b48dd;border:1px solid #ffffff38;text-align:center;font-size:clamp(16px,2.3vw,23px);font-weight:900}.sub{font-size:13px;font-weight:400;opacity:.8;margin-top:5px}
#toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%);padding:13px 24px;border-radius:18px;background:#140c4be8;font-size:20px;font-weight:900;opacity:0;transition:.25s}.show{opacity:1!important}
#power{position:absolute;right:14px;top:130px;width:185px;padding:12px;border-radius:18px;background:#160d4ddd;text-align:center;display:none}.timer{font-size:22px;color:#ffe66a;font-weight:900}
#controls{position:absolute;left:14px;bottom:14px;padding:10px 14px;border-radius:16px;background:#160d4dcc;font-size:13px;line-height:1.7}.mouseTip{color:#ffe66a}
#answers{position:absolute;left:50%;bottom:15px;transform:translateX(-50%);text-align:center;font-size:13px;color:#eae6ff}.answerTag{display:inline-block;margin:3px;padding:5px 10px;border-radius:12px;background:#24186dcc;border:1px solid #ffffff33}
#resultText{font-size:20px;line-height:1.8}.mail{display:inline-block;margin-top:12px;color:#ffe56b}.status{margin-top:12px;color:#9fffd4}
</style>
</head>
<body>
<div id="start"><div class="card panel"><h1>星空熊抱大冒險</h1><p>化身勇敢小男孩，跳上正確答案的星星，逐步飛向天空中的故事書城堡！</p><input id="name" maxlength="30" placeholder="請輸入學生姓名"><button id="play">開始冒險</button><p class="small">操作：← → 移動｜空白鍵跳躍｜滑鼠點擊神秘道具</p></div></div>
<div id="hud" class="hide"><div class="top"><div class="pill">玩家：<span id="playerName"></span></div><div class="pill progress">第 <span id="qNum">1</span>/10 題<div class="bar"><span id="bar"></span></div></div><div class="pill hearts" id="hearts">♥ ♥ ♥ ♥ ♥</div></div><div id="question"></div><div id="power"><div id="powerName"></div><div class="timer" id="timer"></div></div><div id="toast"></div><div id="controls">← → 控制方向<br>空白鍵跳躍<br><span class="mouseTip">點擊發光禮物取得神秘能力</span></div><div id="answers"></div></div>
<div id="end" class="hide"><div class="card panel"><h1 id="endTitle">任務完成！</h1><div id="resultText"></div><div class="status" id="sendStatus"></div><a id="mailFallback" class="mail hide">使用電郵程式傳送成績</a><br><button id="retry">再玩一次</button></div></div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const questions=[
 {q:'美玲在情緒激動時，會變成甚麼動物？',a:['紅熊貓','北極熊','小白兔'],c:0},
 {q:'美玲平日最重視哪一群人的陪伴？',a:['她的好朋友','陌生遊客','電視主持'],c:0},
 {q:'美玲和朋友們最喜歡哪一個偶像團體？',a:['四城男孩','天空樂隊','熊貓合唱團'],c:0},
 {q:'美玲第一次變成紅熊貓時，最主要的感受是甚麼？',a:['驚訝和慌張','十分平靜','完全不在意'],c:0},
 {q:'美玲的媽媽對女兒抱有甚麼態度？',a:['關心但要求較高','完全不理會','只顧自己玩樂'],c:0},
 {q:'美玲需要學習如何處理甚麼？',a:['自己的情緒和成長變化','駕駛飛機','照顧農場'],c:0},
 {q:'朋友們對美玲的紅熊貓秘密有甚麼反應？',a:['接納並支持她','立即離開她','假裝不認識她'],c:0},
 {q:'故事中，紅熊貓象徵甚麼？',a:['情緒、成長和真實的自己','只是一件玩具','一場普通比賽'],c:0},
 {q:'美玲最後明白，面對家人的期望時應該怎樣做？',a:['勇敢表達自己的想法','永遠隱藏感受','逃避所有問題'],c:0},
 {q:'《熊抱青春記》最重要的信息之一是甚麼？',a:['接納自己並珍惜家人朋友','只要得到第一名','永遠不要改變'],c:0}
];

let scene,camera,renderer,clock,player,platforms=[],gifts=[],keys={},started=false,questionIndex=0,lives=5,score=0,startTime=0,vy=0,onGround=false,currentBaseY=0,activePower=null,powerUntil=0,catMode=false;
const $=id=>document.getElementById(id);

function init3D(){
 scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x090526,.018);
 camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);camera.position.set(0,4,12);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;document.body.prepend(renderer.domElement);
 clock=new THREE.Clock();
 scene.add(new THREE.HemisphereLight(0x9ed8ff,0x190b35,2));const moon=new THREE.DirectionalLight(0xfff1d5,2);moon.position.set(-8,14,8);moon.castShadow=true;scene.add(moon);
 const skyGeo=new THREE.BufferGeometry(),pos=[];for(let i=0;i<1000;i++)pos.push((Math.random()-.5)*180,Math.random()*150-15,(Math.random()-.5)*100-25);skyGeo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));const stars=new THREE.Points(skyGeo,new THREE.PointsMaterial({color:0xffffff,size:.16}));scene.add(stars);
 createPlayer();buildLevel();addCastle();addClouds();
 addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
 addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);
 renderer.domElement.addEventListener('pointerdown',pickGift);
 animate();
}
function createPlayer(){
 player=new THREE.Group();const mat=new THREE.MeshStandardMaterial({color:0x6e8cff,roughness:.7});
 const body=new THREE.Mesh(new THREE.CapsuleGeometry(.48,.9,8,16),mat);body.position.y=1.05;body.castShadow=true;player.add(body);
 const head=new THREE.Mesh(new THREE.SphereGeometry(.45,20,16),new THREE.MeshStandardMaterial({color:0xffd1aa}));head.position.y=2;head.castShadow=true;player.add(head);
 const hair=new THREE.Mesh(new THREE.SphereGeometry(.47,20,12,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0x3a211b}));hair.position.y=2.12;player.add(hair);
 [-.18,.18].forEach(x=>{const eye=new THREE.Mesh(new THREE.SphereGeometry(.045,8,8),new THREE.MeshBasicMaterial({color:0x111111}));eye.position.set(x,2.03,.42);player.add(eye)});
 scene.add(player);player.position.set(0,0,0);
}
function starShape(){const s=new THREE.Shape();for(let i=0;i<10;i++){const r=i%2?1.05:2;const a=i*Math.PI/5-Math.PI/2;const x=Math.cos(a)*r,y=Math.sin(a)*r;i?s.lineTo(x,y):s.moveTo(x,y)}s.closePath();return new THREE.ExtrudeGeometry(s,{depth:.35,bevelEnabled:true,bevelSize:.12,bevelThickness:.12,bevelSegments:2})}
function labelSprite(text){const c=document.createElement('canvas');c.width=512;c.height=160;const x=c.getContext('2d');x.fillStyle='rgba(20,10,65,.9)';x.roundRect(5,5,502,150,28);x.fill();x.strokeStyle='white';x.lineWidth=4;x.stroke();x.fillStyle='white';x.font='bold 38px Microsoft JhengHei';x.textAlign='center';x.textBaseline='middle';wrapText(x,text,256,80,470,46);const t=new THREE.CanvasTexture(c);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true}));sp.scale.set(5.1,1.6,1);return sp}
function wrapText(ctx,text,x,y,max,w){let line='',lines=[];for(const ch of text){if(ctx.measureText(line+ch).width>max){lines.push(line);line=ch}else line+=ch}lines.push(line);lines.slice(0,2).forEach((l,i)=>ctx.fillText(l,x,y+(i-(lines.length-1)/2)*w))}
function buildLevel(){platforms.forEach(p=>scene.remove(p.group));platforms=[];gifts.forEach(g=>scene.remove(g));gifts=[];
 const base=new THREE.Mesh(new THREE.CylinderGeometry(3,3.5,.6,32),new THREE.MeshStandardMaterial({color:0x4c348e}));base.position.y=-.3;base.receiveShadow=true;scene.add(base);
 for(let q=0;q<10;q++){const y=3.8+q*5.6;const order=[0,1,2].sort(()=>Math.random()-.5);order.forEach((ans,j)=>{const x=(j-1)*5.2+(q%2?.7:-.7);const group=new THREE.Group();const mesh=new THREE.Mesh(starShape(),new THREE.MeshStandardMaterial({color:[0xffd94f,0x67e1ff,0xff86cf][j],emissive:[0x765000,0x07506d,0x6b174a][j],emissiveIntensity:.45,roughness:.35}));mesh.rotation.x=Math.PI/2;mesh.scale.set(.8,.8,.8);mesh.castShadow=true;group.add(mesh);const lab=labelSprite(questions[q].a[ans]);lab.position.set(0,1.1,0);group.add(lab);group.position.set(x,y,0);scene.add(group);platforms.push({group,q,ans,y,x,used:false});});if(q===2||q===5||q===8)createGift((q%2?3:-3),y+2.5,q)}
}
function createGift(x,y,id){const g=new THREE.Group();const box=new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),new THREE.MeshStandardMaterial({color:0xffd65b,emissive:0x8c5600,emissiveIntensity:1}));g.add(box);const ring=new THREE.Mesh(new THREE.TorusGeometry(.7,.08,10,30),new THREE.MeshBasicMaterial({color:0xffffff}));ring.rotation.x=Math.PI/2;g.add(ring);g.position.set(x,y,0);g.userData.id=id;scene.add(g);gifts.push(g)}
function addCastle(){const g=new THREE.Group();const mat=new THREE.MeshStandardMaterial({color:0xf4c8ff,emissive:0x4e276c,emissiveIntensity:.5});const main=new THREE.Mesh(new THREE.BoxGeometry(7,4,3),mat);main.position.y=2;g.add(main);[-2.6,2.6].forEach(x=>{const t=new THREE.Mesh(new THREE.CylinderGeometry(1,1,6,10),mat);t.position.set(x,3,0);g.add(t);const roof=new THREE.Mesh(new THREE.ConeGeometry(1.4,2.8,10),new THREE.MeshStandardMaterial({color:0x6c64ff}));roof.position.set(x,7.2,0);g.add(roof)});const sign=labelSprite('故事書城堡');sign.position.set(0,5,1.7);g.add(sign);g.position.set(0,61,0);scene.add(g)}
function addClouds(){for(let i=0;i<25;i++){const g=new THREE.Group();for(let j=0;j<4;j++){const m=new THREE.Mesh(new THREE.SphereGeometry(1+Math.random(),12,8),new THREE.MeshLambertMaterial({color:0xcfc9ff,transparent:true,opacity:.22}));m.position.set(j*1.3,Math.random()*.5,Math.random());g.add(m)}g.position.set((Math.random()-.5)*50,Math.random()*65,(Math.random()-.5)*25-8);scene.add(g)}}
function setQuestion(){if(questionIndex>=10)return finish(true);const d=questions[questionIndex];$('qNum').textContent=questionIndex+1;$('bar').style.width=(questionIndex*10)+'%';$('question').innerHTML=`${d.q}<div class="sub">跳上你認為正確的答案星星</div>`;$('answers').innerHTML=d.a.map((a,i)=>`<span class="answerTag">${String.fromCharCode(65+i)}. ${a}</span>`).join('')}
function toast(t,ok=true){$('toast').textContent=t;$('toast').style.color=ok?'#9fffd4':'#ff9bad';$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}
function updateHearts(){$('hearts').textContent=('♥ '.repeat(lives)).trim()+('♡ '.repeat(5-lives)).trim()}
function resetPlayer(){player.position.set(0,currentBaseY+.4,0);vy=0}
function collision(){if(vy>0)return;for(const p of platforms){if(p.q!==questionIndex)continue;const dx=Math.abs(player.position.x-p.x),dy=player.position.y-(p.y+1);if(dx<2.05&&dy<.45&&dy>-.45){if(p.ans===questions[questionIndex].c){score+=100;currentBaseY=p.y;questionIndex++;toast('答對了！繼續向上！');player.position.y=p.y+1.2;vy=8;setQuestion()}else{lives--;updateHearts();toast('答錯了！失去一條生命',false);player.position.y=currentBaseY-4;vy=-8;if(lives<=0)setTimeout(()=>finish(false),900)}return}}}
function pickGift(e){if(!started)return;const mouse=new THREE.Vector2(e.clientX/innerWidth*2-1,-(e.clientY/innerHeight*2-1));const ray=new THREE.Raycaster();ray.setFromCamera(mouse,camera);const hits=ray.intersectObjects(gifts,true);if(!hits.length)return;let g=hits[0].object;while(g.parent&&!g.userData.id&&g.parent!==scene)g=g.parent;if(g.userData.taken)return;g.userData.taken=true;g.visible=false;const powers=['翅膀模式','巨人模式','小貓模式'];const n=Math.floor(Math.random()*3);activePower=n;powerUntil=performance.now()+60000;$('power').style.display='block';$('powerName').textContent='神秘能力：'+powers[n];if(n===1)player.scale.set(1.7,1.7,1.7);if(n===2){catMode=true;player.children[0].material.color.set(0xff9a45)}toast('獲得「'+powers[n]+'」60 秒！')}
function updatePower(){if(activePower===null)return;const left=Math.max(0,Math.ceil((powerUntil-performance.now())/1000));$('timer').textContent=left+' 秒';if(left<=0){activePower=null;$('power').style.display='none';player.scale.set(1,1,1);catMode=false;player.children[0].material.color.set(0x6e8cff);toast('神秘能力結束了')}}
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.035);if(started){const speed=activePower===1?8:5.5;if(keys.ArrowLeft)player.position.x-=speed*dt;if(keys.ArrowRight)player.position.x+=speed*dt;player.position.x=THREE.MathUtils.clamp(player.position.x,-8,8);if(keys.Space&&onGround){vy=activePower===0?15:11;onGround=false}vy-=22*dt;player.position.y+=vy*dt;collision();if(player.position.y<=currentBaseY+.4){player.position.y=currentBaseY+.4;vy=0;onGround=true}if(player.position.y<currentBaseY-7){lives--;updateHearts();toast('掉下去了！失去一條生命',false);resetPlayer();if(lives<=0)finish(false)}camera.position.y+=(player.position.y+4-camera.position.y)*.06;camera.position.x+=(player.position.x*.25-camera.position.x)*.04;camera.lookAt(player.position.x*.15,player.position.y+1,0);gifts.forEach(g=>{g.rotation.y+=dt;g.children[1].rotation.z+=dt*2});platforms.forEach(p=>p.group.rotation.y=Math.sin(performance.now()*.001+p.q)*.04);updatePower()}renderer.render(scene,camera)}
async function finish(win){if(!started)return;started=false;$('hud').classList.add('hide');$('end').classList.remove('hide');const sec=Math.round((Date.now()-startTime)/1000),correct=questionIndex;$('endTitle').textContent=win?'成功到達故事書城堡！':'冒險暫告一段落';$('resultText').innerHTML=`姓名：${escapeHtml($('name').value)}<br>答對：${correct}/10 題<br>分數：${score} 分<br>剩餘生命：${lives}<br>時間：${sec} 秒`;const body={姓名:$('name').value,分數:score,答對題數:`${correct}/10`,剩餘生命:lives,完成時間:`${sec}秒`,_subject:`星空熊抱大冒險成績：${$('name').value}`};try{const r=await fetch('https://formsubmit.co/ajax/yuetki1999@gmail.com',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error();$('sendStatus').textContent='成績已提交至老師電郵。'}catch(e){$('sendStatus').textContent='自動提交未成功，請按下方按鈕傳送。';const subject=encodeURIComponent(`星空熊抱大冒險成績：${$('name').value}`),mailbody=encodeURIComponent(`姓名：${$('name').value}\n答對：${correct}/10\n分數：${score}\n剩餘生命：${lives}\n時間：${sec}秒`);$('mailFallback').href=`mailto:yuetki1999@gmail.com?subject=${subject}&body=${mailbody}`;$('mailFallback').classList.remove('hide')}}
function escapeHtml(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
$('play').onclick=()=>{if(!$('name').value.trim()){alert('請先輸入姓名');return}$('playerName').textContent=$('name').value.trim();$('start').classList.add('hide');$('hud').classList.remove('hide');started=true;startTime=Date.now();setQuestion()};$('retry').onclick=()=>location.reload();init3D();
</script>
</body>
</html>
