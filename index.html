<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>星空熊抱大冒險</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0a0730;color:#fff;font-family:"Microsoft JhengHei",sans-serif}canvas{display:block;width:100%;height:100%;image-rendering:auto}.hide{display:none!important}
.overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,#6251c477,#090527ee);z-index:20}.card{width:min(590px,92vw);padding:34px;text-align:center;background:#17104ee8;border:2px solid #ffffff35;border-radius:26px;box-shadow:0 20px 70px #000a}.card h1{margin:0 0 10px;color:#ffe77a;font-size:clamp(32px,6vw,54px);text-shadow:0 0 20px #ffbb55}.card p{line-height:1.7;color:#eeeaff}.card input{width:100%;padding:15px;border-radius:14px;border:2px solid #8d79ef;background:#0e0838;color:#fff;font-size:18px}.card button{margin-top:16px;border:0;border-radius:999px;padding:13px 28px;background:linear-gradient(135deg,#ffe76d,#ff8fcf);font-size:18px;font-weight:900;color:#2b1548;cursor:pointer}.small{font-size:13px;opacity:.82}
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}.top{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:10px;justify-content:space-between;align-items:flex-start}.pill{padding:9px 14px;background:#17104edc;border:1px solid #ffffff38;border-radius:16px;font-weight:800}.progress{min-width:210px;text-align:center}.bar{height:7px;background:#322769;border-radius:10px;margin-top:5px;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#5ce6ff,#ffe66b);transition:.3s}.hearts{color:#ff6e9d}
#question{position:absolute;top:66px;left:50%;transform:translateX(-50%);width:min(790px,94vw);padding:13px 18px;text-align:center;background:#17104ee8;border:1px solid #ffffff40;border-radius:18px;font-size:clamp(16px,2.2vw,22px);font-weight:900}.sub{font-size:13px;font-weight:400;opacity:.8;margin-top:4px}
#toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);padding:12px 20px;background:#17104ef2;border-radius:16px;font-size:19px;font-weight:900;opacity:0;transition:.2s}.show{opacity:1!important}#controls{position:absolute;left:12px;bottom:12px;padding:9px 13px;background:#17104edc;border-radius:14px;font-size:13px;line-height:1.6}#power{position:absolute;right:12px;top:120px;padding:10px 14px;background:#17104edc;border-radius:14px;text-align:center;display:none}.timer{font-size:21px;font-weight:900;color:#ffe86a}.status{margin-top:12px;color:#9fffd4}.mail{display:inline-block;margin-top:12px;color:#ffe76d}#resultText{font-size:20px;line-height:1.8}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="start" class="overlay"><div class="card"><h1>星空熊抱大冒險</h1><p>像經典橫向跳台遊戲一樣，由左向右前進，跳上正確答案的平台，逐步抵達故事書城堡。</p><input id="name" maxlength="30" placeholder="請輸入學生姓名"><button id="play">開始遊戲</button><p class="small">← → 移動｜空白鍵跳躍｜滑鼠點擊發光禮物</p></div></div>
<div id="hud" class="hide"><div class="top"><div class="pill">玩家：<span id="playerName"></span></div><div class="pill progress">第 <span id="qNum">1</span>/10 題<div class="bar"><span id="bar"></span></div></div><div class="pill hearts" id="hearts">♥ ♥ ♥ ♥ ♥</div></div><div id="question"></div><div id="toast"></div><div id="controls">← → 左右移動<br>空白鍵：跳躍<br>跳上答案平台作答</div><div id="power"><div id="powerName"></div><div id="timer" class="timer"></div></div></div>
<div id="end" class="overlay hide"><div class="card"><h1 id="endTitle"></h1><div id="resultText"></div><div id="sendStatus" class="status"></div><a id="mailFallback" class="mail hide">使用電郵程式傳送成績</a><br><button id="retry">再玩一次</button></div></div>
<script>
const questions=[
{q:'美玲在情緒激動時，會變成甚麼動物？',a:['紅熊貓','北極熊','小白兔'],c:0},
{q:'美玲平日最重視哪一群人的陪伴？',a:['她的好朋友','陌生遊客','電視主持'],c:0},
{q:'美玲和朋友們最喜歡哪一個偶像團體？',a:['四城男孩','天空樂隊','熊貓合唱團'],c:0},
{q:'美玲第一次變成紅熊貓時，最主要的感受是甚麼？',a:['驚訝和慌張','十分平靜','完全不在意'],c:0},
{q:'美玲的媽媽對女兒抱有甚麼態度？',a:['關心但要求較高','完全不理會','只顧自己玩樂'],c:0},
{q:'美玲需要學習如何處理甚麼？',a:['自己的情緒和成長變化','駕駛飛機','照顧農場'],c:0},
{q:'朋友們對美玲的紅熊貓秘密有甚麼反應？',a:['接納並支持她','立即離開她','假裝不認識她'],c:0},
{q:'故事中，紅熊貓象徵甚麼？',a:['情緒、成長和真實的自己','只是一件玩具','一場普通比賽'],c:0},
{q:'美玲最後明白，面對家人的期望時應該怎樣做？',a:['勇敢表達自己的想法','永遠隱藏感受','逃避所有問題'],c:0},
{q:'《熊抱青春記》最重要的信息之一是甚麼？',a:['接納自己並珍惜家人朋友','只要得到第一名','永遠不要改變'],c:0}
];
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),$=id=>document.getElementById(id);
let W=1280,H=720,dpr=1,running=false,qIndex=0,lives=5,score=0,startTime=0,last=0,keys={},jumpQueued=false,answerLocked=false,invulnerable=false,platforms=[],particles=[],gifts=[],power=null,powerUntil=0;
const player={x:90,y:0,w:38,h:58,vx:0,vy:0,onGround:false,facing:1,scale:1,cat:false,wings:false};
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);buildLevel()}addEventListener('resize',resize);
addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();if(e.code==='Space'&&!keys.Space)jumpQueued=true;keys[e.code]=true});
addEventListener('keyup',e=>keys[e.code]=false);
canvas.addEventListener('click',e=>{if(!running)return;const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;for(const g of gifts){if(!g.taken&&mx>g.x-g.s/2&&mx<g.x+g.s/2&&my>g.y-g.s/2&&my<g.y+g.s/2){g.taken=true;activatePower();break}}});
function groundY(){return H-88}
function buildLevel(){if(!W||!H)return;const gy=groundY();const pw=Math.max(150,Math.min(210,W*.18));const gap=(W-pw*3)/4;const order=[0,1,2].sort(()=>Math.random()-.5);platforms=order.map((ans,i)=>({x:gap+(gap+pw)*i,y:gy-105,w:pw,h:24,ans,used:false}));gifts=[{x:W-70,y:gy-48,s:44,taken:false}];player.y=Math.min(player.y||gy-player.h,gy-player.h)}
function resetForQuestion(){answerLocked=false;invulnerable=false;player.x=70;player.y=groundY()-player.h;player.vx=0;player.vy=0;player.onGround=true;buildLevel();setQuestion()}
function setQuestion(){if(qIndex>=10){finish(true);return}const d=questions[qIndex];$('qNum').textContent=qIndex+1;$('bar').style.width=qIndex*10+'%';$('question').innerHTML=d.q+'<div class="sub">由左向右跳上正確答案的平台</div>'}
function hearts(){$('hearts').textContent='♥ '.repeat(lives)+'♡ '.repeat(5-lives)}
function toast(text,ok=true){$('toast').textContent=text;$('toast').style.color=ok?'#9fffd4':'#ff9bad';$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1400)}
function activatePower(){const n=Math.floor(Math.random()*3),names=['翅膀模式','巨人模式','小貓模式'];power=n;powerUntil=performance.now()+60000;player.wings=n===0;player.scale=n===1?1.35:1;player.cat=n===2;$('power').style.display='block';$('powerName').textContent='神秘能力：'+names[n];toast('獲得「'+names[n]+'」60秒！')}
function updatePower(){if(power===null)return;const left=Math.max(0,Math.ceil((powerUntil-performance.now())/1000));$('timer').textContent=left+' 秒';if(left<=0){power=null;player.wings=false;player.scale=1;player.cat=false;$('power').style.display='none';toast('神秘能力結束了')}}
function rects(a,b){return a.x<a.x+a.w&&a.x+a.w>b.x&&a.x<b.x+b.w&&a.y+a.h>b.y&&a.y<b.y+b.h}
function update(dt){if(!running)return;const gy=groundY(),speed=power===1?390:310,jump=player.wings?650:560;player.vx=0;if(keys.ArrowLeft){player.vx=-speed;player.facing=-1}if(keys.ArrowRight){player.vx=speed;player.facing=1}if(jumpQueued){if(player.onGround&&!answerLocked){player.vy=-jump;player.onGround=false}jumpQueued=false}player.vy+=1500*dt;const prevBottom=player.y+player.h;player.x+=player.vx*dt;player.y+=player.vy*dt;player.x=Math.max(0,Math.min(W-player.w,player.x));player.onGround=false;
if(player.y+player.h>=gy){player.y=gy-player.h;player.vy=0;player.onGround=true}
if(player.vy>=0&&!answerLocked){for(const p of platforms){if(p.used)continue;const horizontal=player.x+player.w>p.x&&player.x<p.x+p.w;const crossed=prevBottom<=p.y+5&&player.y+player.h>=p.y;if(horizontal&&crossed){player.y=p.y-player.h;player.vy=0;player.onGround=true;chooseAnswer(p);break}}}
if(player.y>H+120&&!invulnerable)loseLife('掉下去了！');updatePower();particles.forEach(o=>{o.x+=o.vx*dt;o.y+=o.vy*dt;o.vy+=260*dt;o.life-=dt});particles=particles.filter(o=>o.life>0)}
function chooseAnswer(p){if(answerLocked)return;answerLocked=true;p.used=true;if(p.ans===questions[qIndex].c){score+=100;burst(p.x+p.w/2,p.y,'#ffe66d');toast('答對了！前往下一關！');setTimeout(()=>{qIndex++;resetForQuestion()},900)}else{loseLife('答錯了！失去一條生命。',p)}}
function loseLife(msg,p){if(invulnerable)return;invulnerable=true;lives--;hearts();toast(msg,false);if(p)p.used=true;setTimeout(()=>{if(lives<=0){finish(false);return}resetForQuestion()},850)}
function burst(x,y,color){for(let i=0;i<26;i++)particles.push({x,y,vx:(Math.random()-.5)*300,vy:-Math.random()*260-80,life:.8+Math.random()*.5,color})}
function draw(){ctx.clearRect(0,0,W,H);drawSky();drawHills();drawGround();drawPlatforms();drawGift();drawPlayer();drawParticles()}
function drawSky(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#17104f');g.addColorStop(.62,'#423792');g.addColorStop(1,'#7659c8');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.9)';for(let i=0;i<90;i++){const x=(i*137)%W,y=(i*83)%(H*.65),r=i%7===0?2:1;ctx.fillRect(x,y,r,r)}ctx.fillStyle='#fff0ac';ctx.beginPath();ctx.arc(W-110,110,48,0,Math.PI*2);ctx.fill()}
function drawHills(){const gy=groundY();ctx.fillStyle='#2e266e';for(let i=0;i<6;i++){const x=i*W/5-80;ctx.beginPath();ctx.arc(x,gy+20,120+i%2*30,Math.PI,0);ctx.fill()}ctx.fillStyle='#20194f';for(let i=0;i<5;i++){const x=i*W/4+60;ctx.beginPath();ctx.arc(x,gy+35,90+i%2*22,Math.PI,0);ctx.fill()}}
function drawGround(){const gy=groundY();ctx.fillStyle='#6b4ad1';ctx.fillRect(0,gy,W,H-gy);ctx.fillStyle='#9175ef';for(let x=0;x<W;x+=48){ctx.fillRect(x,gy,44,12);ctx.fillStyle='#5439ab';ctx.fillRect(x+4,gy+18,40,22);ctx.fillStyle='#9175ef'}}
function drawPlatforms(){const d=questions[qIndex]||questions[9];platforms.forEach((p,i)=>{ctx.save();ctx.translate(p.x,p.y);ctx.fillStyle=['#f5c84d','#59d9ef','#ef80c6'][i];roundRect(0,0,p.w,p.h,8);ctx.fill();ctx.fillStyle='rgba(255,255,255,.22)';ctx.fillRect(8,4,p.w-16,5);ctx.fillStyle='#241957';roundRect(0,-54,p.w,42,12);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold 18px Microsoft JhengHei';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.a[p.ans],p.w/2,-33,p.w-16);drawStar(p.w/2,p.h+24,18,['#f5c84d','#59d9ef','#ef80c6'][i]);ctx.restore()})}
function drawStar(cx,cy,r,color){ctx.save();ctx.translate(cx,cy);ctx.beginPath();for(let i=0;i<10;i++){const rr=i%2?r*.48:r,a=-Math.PI/2+i*Math.PI/5,x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.fillStyle=color;ctx.fill();ctx.restore()}
function drawGift(){for(const g of gifts){if(g.taken)continue;ctx.save();ctx.translate(g.x,g.y);ctx.shadowBlur=20;ctx.shadowColor='#ffe66d';ctx.fillStyle='#ffd65d';roundRect(-g.s/2,-g.s/2,g.s,g.s,8);ctx.fill();ctx.fillStyle='#ff8ac6';ctx.fillRect(-5,-g.s/2,10,g.s);ctx.fillRect(-g.s/2,-5,g.s,10);ctx.restore()}}
function drawPlayer(){ctx.save();ctx.translate(player.x+player.w/2,player.y+player.h);ctx.scale(player.facing*player.scale,player.scale);if(player.wings){ctx.fillStyle='rgba(230,245,255,.9)';ctx.beginPath();ctx.ellipse(-25,-34,18,28,-.5,0,Math.PI*2);ctx.ellipse(25,-34,18,28,.5,0,Math.PI*2);ctx.fill()}ctx.fillStyle=player.cat?'#f49a45':'#5478ef';roundRect(-17,-48,34,48,14);ctx.fill();ctx.fillStyle='#ffd0a8';ctx.beginPath();ctx.arc(0,-58,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#37221d';ctx.beginPath();ctx.arc(0,-63,17,Math.PI,0);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(-7,-59,3,3);ctx.fillRect(5,-59,3,3);if(player.cat){ctx.fillStyle='#f49a45';ctx.beginPath();ctx.moveTo(-14,-69);ctx.lineTo(-5,-82);ctx.lineTo(0,-67);ctx.moveTo(14,-69);ctx.lineTo(5,-82);ctx.lineTo(0,-67);ctx.fill()}ctx.restore()}
function drawParticles(){particles.forEach(o=>{ctx.globalAlpha=Math.max(0,o.life);ctx.fillStyle=o.color;ctx.fillRect(o.x,o.y,5,5)});ctx.globalAlpha=1}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
function loop(t){const dt=Math.min((t-last)/1000||0,.033);last=t;update(dt);draw();requestAnimationFrame(loop)}
async function finish(win){if(!running)return;running=false;$('hud').classList.add('hide');$('end').classList.remove('hide');const sec=Math.round((Date.now()-startTime)/1000);$('endTitle').textContent=win?'成功到達故事書城堡！':'冒險暫告一段落';$('resultText').innerHTML='姓名：'+safe($('name').value)+'<br>答對：'+qIndex+'/10 題<br>分數：'+score+' 分<br>剩餘生命：'+lives+'<br>時間：'+sec+' 秒';const body={姓名:$('name').value,分數:score,答對題數:qIndex+'/10',剩餘生命:lives,完成時間:sec+'秒',_subject:'星空熊抱大冒險成績：'+$('name').value};try{const r=await fetch('https://formsubmit.co/ajax/yuetki1999@gmail.com',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error();$('sendStatus').textContent='成績已提交至老師電郵。'}catch(e){$('sendStatus').textContent='自動提交未成功，請按下方按鈕傳送。';$('mailFallback').href='mailto:yuetki1999@gmail.com?subject='+encodeURIComponent('星空熊抱大冒險成績：'+$('name').value)+'&body='+encodeURIComponent('姓名：'+$('name').value+'\n答對：'+qIndex+'/10\n分數：'+score+'\n剩餘生命：'+lives+'\n時間：'+sec+'秒');$('mailFallback').classList.remove('hide')}}
function safe(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
$('play').onclick=()=>{if(!$('name').value.trim()){alert('請先輸入姓名');return}$('playerName').textContent=$('name').value.trim();$('start').classList.add('hide');$('hud').classList.remove('hide');running=true;startTime=Date.now();resetForQuestion()};$('retry').onclick=()=>location.reload();resize();requestAnimationFrame(loop);
</script>
</body>
</html>
