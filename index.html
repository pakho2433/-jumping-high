<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>星空熊抱大冒險</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07031d;color:#fff;font-family:"Microsoft JhengHei",sans-serif}canvas{display:block}.hide{display:none!important}
.panel{background:rgba(20,11,68,.88);border:1px solid #ffffff44;border-radius:24px;box-shadow:0 16px 55px #0009;backdrop-filter:blur(10px)}
#start,#end{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#5140ad88,#07031ddd)}
.card{width:min(570px,92vw);padding:34px;text-align:center}.card h1{margin:0 0 10px;font-size:clamp(30px,6vw,52px);color:#ffe986;text-shadow:0 0 20px #ffba50}.card p{line-height:1.7;color:#ece9ff}.card input{width:100%;padding:15px;border-radius:15px;border:2px solid #8b75ed;background:#100939;color:#fff;font-size:18px}.card button,#retry{margin-top:16px;padding:13px 28px;border:0;border-radius:999px;background:linear-gradient(135deg,#ffe86a,#ff8acb);color:#291346;font-size:18px;font-weight:900;cursor:pointer}.small{font-size:13px;opacity:.82}
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}.top{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:10px;justify-content:space-between}.pill{padding:10px 15px;border-radius:17px;background:#160d4ddd;border:1px solid #ffffff38;font-weight:800}.hearts{color:#ff6b9e}.progress{min-width:210px;text-align:center}.bar{height:7px;background:#352673;border-radius:8px;margin-top:5px;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#5eeaff,#ffe46d);transition:.3s}
#question{position:absolute;top:67px;left:50%;transform:translateX(-50%);width:min(760px,94vw);padding:13px 18px;border-radius:19px;background:#130b48e8;border:1px solid #ffffff38;text-align:center;font-size:clamp(16px,2.2vw,22px);font-weight:900}.sub{font-size:13px;font-weight:400;opacity:.8;margin-top:4px}
#toast{position:absolute;left:50%;bottom:95px;transform:translateX(-50%);padding:13px 22px;border-radius:18px;background:#140c4bf0;font-size:20px;font-weight:900;opacity:0;transition:.2s}.show{opacity:1!important}
#controls{position:absolute;left:12px;bottom:12px;padding:10px 14px;border-radius:15px;background:#160d4ddd;font-size:13px;line-height:1.7}#power{position:absolute;right:12px;top:125px;padding:12px 16px;border-radius:16px;background:#160d4ddd;display:none;text-align:center}.timer{color:#ffe66a;font-size:21px;font-weight:900}
#resultText{font-size:20px;line-height:1.8}.status{margin-top:12px;color:#9fffd4}.mail{display:inline-block;margin-top:12px;color:#ffe56b}
</style>
</head>
<body>
<div id="start"><div class="card panel"><h1>星空熊抱大冒險</h1><p>在固定側面畫面中，跳到正確答案的星星上，逐層前往故事書城堡。</p><input id="name" maxlength="30" placeholder="請輸入學生姓名"><button id="play">開始冒險</button><p class="small">← → 左右移動｜空白鍵跳躍｜滑鼠點擊發光禮物</p></div></div>
<div id="hud" class="hide"><div class="top"><div class="pill">玩家：<span id="playerName"></span></div><div class="pill progress">第 <span id="qNum">1</span>/10 題<div class="bar"><span id="bar"></span></div></div><div class="pill hearts" id="hearts">♥ ♥ ♥ ♥ ♥</div></div><div id="question"></div><div id="toast"></div><div id="controls">← → 控制方向<br>空白鍵跳躍<br>落在星星上即選擇答案</div><div id="power"><div id="powerName"></div><div id="timer" class="timer"></div></div></div>
<div id="end" class="hide"><div class="card panel"><h1 id="endTitle"></h1><div id="resultText"></div><div id="sendStatus" class="status"></div><a id="mailFallback" class="mail hide">使用電郵程式傳送成績</a><br><button id="retry">再玩一次</button></div></div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
const questions=[
{q:'美玲在情緒激動時，會變成甚麼動物？',a:['紅熊貓','北極熊','小白兔'],c:0},
{q:'美玲平日最重視哪一群人的陪伴？',a:['她的好朋友','陌生遊客','電視主持'],c:0},
{q:'美玲和朋友們最喜歡哪一個偶像團體？',a:['四城男孩','天空樂隊','熊貓合唱團'],c:0},
{q:'美玲第一次變成紅熊貓時，最主要的感受是甚麼？',a:['驚訝和慌張','十分平靜','完全不在意'],c:0},
{q:'美玲的媽媽對女兒抱有甚麼態度？',a:['關心但要求較高','完全不理會','只顧自己玩樂'],c:0},
{q:'美玲需要學習如何處理甚麼？',a:['自己的情緒和成長變化','駕駛飛機','照顧農場'],c:0},
{q:'朋友們對美玲的紅熊貓秘密有甚麼反應？',a:['接納並支持她','立即離開她','假裝不認識她'],c:0},
{q:'故事中，紅熊貓象徵甚麼？',a:['情緒、成長和真實的自己','只是一件玩具','一場普通比賽'],c:0},
{q:'美玲最後明白，面對家人的期望時應該怎樣做？',a:['勇敢表達自己的想法','永遠隱藏感受','逃避所有問題'],c:0},
{q:'《熊抱青春記》最重要的信息之一是甚麼？',a:['接納自己並珍惜家人朋友','只要得到第一名','永遠不要改變'],c:0}
];
const $=id=>document.getElementById(id);
let scene,camera,renderer,clock,player,keys={},platforms=[],gifts=[];
let started=false,qIndex=0,lives=5,score=0,startTime=0,vy=0,onGround=true,currentFloor=0,lastY=0,locked=false,activePower=null,powerUntil=0;
const PLAYER_HALF=.48,GRAVITY=24,JUMP=13.2,MOVE=7.2;
function init(){scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x080421,.018);camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.1,500);camera.position.set(0,5,24);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;document.body.prepend(renderer.domElement);clock=new THREE.Clock();scene.add(new THREE.HemisphereLight(0xb7dfff,0x17082d,2.2));const l=new THREE.DirectionalLight(0xfff0d5,2);l.position.set(-8,14,12);l.castShadow=true;scene.add(l);makeSky();makeGround();makePlayer();makePlatforms();makeCastle();addEventListener('resize',resize);addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);renderer.domElement.addEventListener('click',pickGift);animate()}
function resize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)}
function makeSky(){const g=new THREE.BufferGeometry(),p=[];for(let i=0;i<850;i++)p.push((Math.random()-.5)*90,Math.random()*100-12,(Math.random()-.5)*35-12);g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.13})));for(let i=0;i<18;i++){const c=new THREE.Group();for(let j=0;j<4;j++){const m=new THREE.Mesh(new THREE.SphereGeometry(1+Math.random()*.8,12,8),new THREE.MeshLambertMaterial({color:0x8c86d4,transparent:true,opacity:.18}));m.position.set(j*1.1,Math.random()*.35,0);c.add(m)}c.position.set((Math.random()-.5)*55,Math.random()*70,-8-Math.random()*8);scene.add(c)}}
function makeGround(){const g=new THREE.Mesh(new THREE.BoxGeometry(18,.7,4),new THREE.MeshStandardMaterial({color:0x49348f}));g.position.set(0,-.35,0);g.receiveShadow=true;scene.add(g)}
function makePlayer(){player=new THREE.Group();const body=new THREE.Mesh(new THREE.CapsuleGeometry(.48,.9,8,16),new THREE.MeshStandardMaterial({color:0x5f80ff}));body.position.y=1.02;body.castShadow=true;player.add(body);const head=new THREE.Mesh(new THREE.SphereGeometry(.45,20,16),new THREE.MeshStandardMaterial({color:0xffd1aa}));head.position.y=1.98;head.castShadow=true;player.add(head);const hair=new THREE.Mesh(new THREE.SphereGeometry(.47,20,12,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0x38221c}));hair.position.y=2.1;player.add(hair);[-.17,.17].forEach(x=>{const e=new THREE.Mesh(new THREE.SphereGeometry(.045,8,8),new THREE.MeshBasicMaterial({color:0x111111}));e.position.set(x,2.01,.42);player.add(e)});scene.add(player);player.position.set(0,0,0)}
function starGeometry(){const s=new THREE.Shape();for(let i=0;i<10;i++){const r=i%2?1.05:1.85,a=i*Math.PI/5-Math.PI/2,x=Math.cos(a)*r,y=Math.sin(a)*r;i?s.lineTo(x,y):s.moveTo(x,y)}s.closePath();return new THREE.ExtrudeGeometry(s,{depth:.45,bevelEnabled:true,bevelSize:.1,bevelThickness:.1,bevelSegments:2})}
function textSprite(text){const c=document.createElement('canvas');c.width=512;c.height=145;const x=c.getContext('2d');x.fillStyle='rgba(48,31,112,.96)';x.roundRect(4,4,504,137,24);x.fill();x.strokeStyle='#fff';x.lineWidth=4;x.stroke();x.fillStyle='#fff';x.font='bold 35px Microsoft JhengHei';x.textAlign='center';x.textBaseline='middle';x.fillText(text,256,72,470);const t=new THREE.CanvasTexture(c),s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true}));s.scale.set(4.4,1.25,1);return s}
function makePlatforms(){for(let q=0;q<10;q++){const y=3.1+q*4.15,order=[0,1,2].sort(()=>Math.random()-.5),xs=[-5.2,0,5.2];order.forEach((ans,j)=>{const group=new THREE.Group();const star=new THREE.Mesh(starGeometry(),new THREE.MeshStandardMaterial({color:[0xffd94f,0x64dfff,0xff83cd][j],emissive:[0x6b4d00,0x075066,0x681342][j],emissiveIntensity:.45}));star.position.y=-.62;star.castShadow=true;group.add(star);const deck=new THREE.Mesh(new THREE.BoxGeometry(3.7,.32,1.8),new THREE.MeshStandardMaterial({color:[0xffe778,0x8aeaff,0xffa8df][j],transparent:true,opacity:.96}));deck.position.y=.12;deck.castShadow=true;group.add(deck);const label=textSprite(questions[q].a[ans]);label.position.set(0,1.45,.1);group.add(label);group.position.set(xs[j],y,0);scene.add(group);platforms.push({group,q,ans,x:xs[j],top:y+.28,half:1.85,used:false});});if(q===2||q===5||q===8)makeGift(q%2?6.7:-6.7,y+1.1,q)}}
function makeGift(x,y,id){const g=new THREE.Group();const b=new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),new THREE.MeshStandardMaterial({color:0xffda62,emissive:0x8c5700,emissiveIntensity:1}));g.add(b);const r=new THREE.Mesh(new THREE.TorusGeometry(.72,.08,10,30),new THREE.MeshBasicMaterial({color:0xffffff}));r.rotation.x=Math.PI/2;g.add(r);g.position.set(x,y,.5);g.userData.giftId=id+1;scene.add(g);gifts.push(g)}
function makeCastle(){const g=new THREE.Group(),m=new THREE.MeshStandardMaterial({color:0xf4c8ff,emissive:0x4e276c,emissiveIntensity:.45});const b=new THREE.Mesh(new THREE.BoxGeometry(7,4,3),m);b.position.y=2;g.add(b);[-2.5,2.5].forEach(x=>{const t=new THREE.Mesh(new THREE.CylinderGeometry(1,1,6,10),m);t.position.set(x,3,0);g.add(t);const r=new THREE.Mesh(new THREE.ConeGeometry(1.4,2.5,10),new THREE.MeshStandardMaterial({color:0x6c64ff}));r.position.set(x,7,0);g.add(r)});const s=textSprite('故事書城堡');s.position.set(0,5.2,1.8);g.add(s);g.position.set(0,44.2,0);scene.add(g)}
function setQuestion(){if(qIndex>=10)return finish(true);const d=questions[qIndex];$('qNum').textContent=qIndex+1;$('bar').style.width=qIndex*10+'%';$('question').innerHTML=d.q+'<div class="sub">從側面跳到正確答案的星星平台</div>'}
function toast(t,ok=true){$('toast').textContent=t;$('toast').style.color=ok?'#9fffd4':'#ff9bad';$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}
function hearts(){$('hearts').textContent='♥ '.repeat(lives)+'♡ '.repeat(5-lives)}
function resetPlayer(){player.position.set(0,currentFloor,0);lastY=currentFloor;vy=0;onGround=true;locked=false}
function landOnPlatform(){if(vy>0||locked)return;for(const p of platforms){if(p.q!==qIndex||p.used)continue;const inside=player.position.x+PLAYER_HALF>=p.x-p.half&&player.position.x-PLAYER_HALF<=p.x+p.half;const crossed=lastY>=p.top-.05&&player.position.y<=p.top+.18;if(inside&&crossed){player.position.y=p.top;vy=0;onGround=true;p.used=true;locked=true;if(p.ans===questions[qIndex].c){currentFloor=p.top;score+=100;toast('答對了！小男孩已站穩在星星上！');setTimeout(()=>{qIndex++;locked=false;setQuestion()},500)}else{lives--;hearts();toast('答錯了！星星將會消失。',false);setTimeout(()=>{p.group.visible=false;onGround=false;locked=false;vy=-3.5;if(lives<=0)finish(false)},500)}return true}}return false}
function pickGift(e){if(!started)return;const m=new THREE.Vector2(e.clientX/innerWidth*2-1,-(e.clientY/innerHeight*2-1)),ray=new THREE.Raycaster();ray.setFromCamera(m,camera);const hits=ray.intersectObjects(gifts,true);if(!hits.length)return;let g=hits[0].object;while(g.parent&&!g.userData.giftId&&g.parent!==scene)g=g.parent;if(g.userData.taken)return;g.userData.taken=true;g.visible=false;const names=['翅膀模式','巨人模式','小貓模式'],n=Math.floor(Math.random()*3);activePower=n;powerUntil=performance.now()+60000;$('power').style.display='block';$('powerName').textContent='神秘能力：'+names[n];if(n===1)player.scale.set(1.45,1.45,1.45);if(n===2)player.children[0].material.color.set(0xff9a45);toast('獲得「'+names[n]+'」60秒！')}
function updatePower(){if(activePower===null)return;const left=Math.max(0,Math.ceil((powerUntil-performance.now())/1000));$('timer').textContent=left+' 秒';if(left<=0){activePower=null;$('power').style.display='none';player.scale.set(1,1,1);player.children[0].material.color.set(0x5f80ff);toast('神秘能力結束了')}}
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.033);if(started){lastY=player.position.y;if(!locked){const speed=activePower===1?9:MOVE;if(keys.ArrowLeft)player.position.x-=speed*dt;if(keys.ArrowRight)player.position.x+=speed*dt;player.position.x=THREE.MathUtils.clamp(player.position.x,-8.4,8.4);if(keys.Space&&onGround){vy=activePower===0?15.5:JUMP;onGround=false}vy-=GRAVITY*dt;player.position.y+=vy*dt;landOnPlatform();if(currentFloor===0&&player.position.y<=0){player.position.y=0;vy=0;onGround=true}if(player.position.y<currentFloor-6.5){lives--;hearts();toast('掉下去了！失去一條生命。',false);resetPlayer();if(lives<=0)finish(false)}}const targetY=player.position.y+4.2;camera.position.x+=(player.position.x*.08-camera.position.x)*.05;camera.position.y+=(targetY-camera.position.y)*.07;camera.position.z=24;camera.lookAt(player.position.x*.08,player.position.y+2,0);gifts.forEach(g=>{g.rotation.y+=dt;g.children[1].rotation.z+=dt*2});updatePower()}renderer.render(scene,camera)}
async function finish(win){if(!started)return;started=false;$('hud').classList.add('hide');$('end').classList.remove('hide');const sec=Math.round((Date.now()-startTime)/1000);$('endTitle').textContent=win?'成功到達故事書城堡！':'冒險暫告一段落';$('resultText').innerHTML='姓名：'+safe($('name').value)+'<br>答對：'+qIndex+'/10 題<br>分數：'+score+' 分<br>剩餘生命：'+lives+'<br>時間：'+sec+' 秒';const body={姓名:$('name').value,分數:score,答對題數:qIndex+'/10',剩餘生命:lives,完成時間:sec+'秒',_subject:'星空熊抱大冒險成績：'+$('name').value};try{const r=await fetch('https://formsubmit.co/ajax/yuetki1999@gmail.com',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error();$('sendStatus').textContent='成績已提交至老師電郵。'}catch(e){$('sendStatus').textContent='自動提交未成功，請按下方按鈕傳送。';$('mailFallback').href='mailto:yuetki1999@gmail.com?subject='+encodeURIComponent('星空熊抱大冒險成績：'+$('name').value)+'&body='+encodeURIComponent('姓名：'+$('name').value+'\n答對：'+qIndex+'/10\n分數：'+score+'\n剩餘生命：'+lives+'\n時間：'+sec+'秒');$('mailFallback').classList.remove('hide')}}
function safe(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
$('play').onclick=()=>{if(!$('name').value.trim()){alert('請先輸入姓名');return}$('playerName').textContent=$('name').value.trim();$('start').classList.add('hide');$('hud').classList.remove('hide');started=true;startTime=Date.now();setQuestion()};$('retry').onclick=()=>location.reload();init();
</script>
</body>
</html>
