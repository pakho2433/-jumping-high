<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>星空熊抱大冒險</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090526;color:#fff;font-family:"Microsoft JhengHei",sans-serif}canvas{display:block;cursor:grab}.dragging canvas{cursor:grabbing}.hide{display:none!important}
.panel{background:rgba(17,10,59,.84);border:1px solid rgba(255,255,255,.3);box-shadow:0 12px 45px #0008;backdrop-filter:blur(10px);border-radius:24px}
#start,#end{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#44349d88,#07031ddd)}
.card{width:min(560px,92vw);padding:34px;text-align:center}.card h1{margin:0 0 8px;font-size:clamp(30px,6vw,54px);color:#ffe986;text-shadow:0 0 20px #ffba50}.card p{line-height:1.7;color:#e8e4ff}.card input{width:100%;padding:15px 18px;border-radius:15px;border:2px solid #8a74e8;background:#100939;color:#fff;font-size:18px;outline:none}.card button,#retry{margin-top:16px;padding:13px 28px;border:0;border-radius:999px;background:linear-gradient(135deg,#ffe86a,#ff8acb);color:#2a1248;font-size:18px;font-weight:900;cursor:pointer}.small{font-size:13px;opacity:.8}
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}.top{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:10px;justify-content:space-between;align-items:flex-start}.pill{padding:10px 15px;border-radius:18px;background:#160d4dcc;border:1px solid #ffffff38;font-weight:800}.hearts{color:#ff679a;letter-spacing:2px}.progress{min-width:220px;text-align:center}.bar{height:7px;background:#352673;border-radius:8px;margin-top:5px;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#5eeaff,#ffe46d);transition:.3s}
#question{position:absolute;top:70px;left:50%;transform:translateX(-50%);width:min(760px,94vw);padding:14px 20px;border-radius:20px;background:#130b48dd;border:1px solid #ffffff38;text-align:center;font-size:clamp(16px,2.3vw,23px);font-weight:900}.sub{font-size:13px;font-weight:400;opacity:.8;margin-top:5px}
#toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%);padding:13px 24px;border-radius:18px;background:#140c4be8;font-size:20px;font-weight:900;opacity:0;transition:.25s}.show{opacity:1!important}
#power{position:absolute;right:14px;top:130px;width:185px;padding:12px;border-radius:18px;background:#160d4ddd;text-align:center;display:none}.timer{font-size:22px;color:#ffe66a;font-weight:900}
#controls{position:absolute;left:14px;bottom:14px;padding:10px 14px;border-radius:16px;background:#160d4dcc;font-size:13px;line-height:1.65}.mouseTip{color:#ffe66a}
#answers{position:absolute;left:50%;bottom:15px;transform:translateX(-50%);text-align:center;font-size:13px}.answerTag{display:inline-block;margin:3px;padding:5px 10px;border-radius:12px;background:#24186dcc;border:1px solid #ffffff33}
#resultText{font-size:20px;line-height:1.8}.mail{display:inline-block;margin-top:12px;color:#ffe56b}.status{margin-top:12px;color:#9fffd4}
</style>
</head>
<body>
<div id="start"><div class="card panel"><h1>星空熊抱大冒險</h1><p>跳上正確答案的星星，逐步前往天空中的故事書城堡！</p><input id="name" maxlength="30" placeholder="請輸入學生姓名"><button id="play">開始冒險</button><p class="small">← → 移動｜空白鍵跳躍｜拖曳滑鼠旋轉視角｜滾輪縮放</p></div></div>
<div id="hud" class="hide"><div class="top"><div class="pill">玩家：<span id="playerName"></span></div><div class="pill progress">第 <span id="qNum">1</span>/10 題<div class="bar"><span id="bar"></span></div></div><div class="pill hearts" id="hearts">♥ ♥ ♥ ♥ ♥</div></div><div id="question"></div><div id="power"><div id="powerName"></div><div class="timer" id="timer"></div></div><div id="toast"></div><div id="controls">← → 控制方向<br>空白鍵跳躍<br>拖曳滑鼠：轉動視角<br>滾輪：遠近縮放<br><span class="mouseTip">單擊發光禮物取得能力</span></div><div id="answers"></div></div>
<div id="end" class="hide"><div class="card panel"><h1 id="endTitle"></h1><div id="resultText"></div><div class="status" id="sendStatus"></div><a id="mailFallback" class="mail hide">使用電郵程式傳送成績</a><br><button id="retry">再玩一次</button></div></div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
const questions=[
{q:'美玲在情緒激動時，會變成甚麼動物？',a:['紅熊貓','北極熊','小白兔'],c:0},
{q:'美玲平日最重視哪一群人的陪伴？',a:['她的好朋友','陌生遊客','電視主持'],c:0},
{q:'美玲和朋友們最喜歡哪一個偶像團體？',a:['四城男孩','天空樂隊','熊貓合唱團'],c:0},
{q:'美玲第一次變成紅熊貓時，最主要的感受是甚麼？',a:['驚訝和慌張','十分平靜','完全不在意'],c:0},
{q:'美玲的媽媽對女兒抱有甚麼態度？',a:['關心但要求較高','完全不理會','只顧自己玩樂'],c:0},
{q:'美玲需要學習如何處理甚麼？',a:['自己的情緒和成長變化','駕駛飛機','照顧農場'],c:0},
{q:'朋友們對美玲的紅熊貓秘密有甚麼反應？',a:['接納並支持她','立即離開她','假裝不認識她'],c:0},
{q:'故事中，紅熊貓象徵甚麼？',a:['情緒、成長和真實的自己','只是一件玩具','一場普通比賽'],c:0},
{q:'美玲最後明白，面對家人的期望時應該怎樣做？',a:['勇敢表達自己的想法','永遠隱藏感受','逃避所有問題'],c:0},
{q:'《熊抱青春記》最重要的信息之一是甚麼？',a:['接納自己並珍惜家人朋友','只要得到第一名','永遠不要改變'],c:0}
];
let scene,camera,renderer,clock,player,platforms=[],gifts=[],keys={},started=false,questionIndex=0,lives=5,score=0,startTime=0,vy=0,onGround=true,currentFloor=0,previousY=0,activePower=null,powerUntil=0;
let viewYaw=0,viewPitch=.18,viewDistance=12,dragging=false,dragStartX=0,dragStartY=0,lastX=0,lastY=0,dragDistance=0;
const $=id=>document.getElementById(id);
function init(){scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x090526,.018);camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;document.body.prepend(renderer.domElement);clock=new THREE.Clock();scene.add(new THREE.HemisphereLight(0x9ed8ff,0x190b35,2));const light=new THREE.DirectionalLight(0xfff1d5,2);light.position.set(-8,14,8);light.castShadow=true;scene.add(light);makeSky();makePlayer();makeLevel();makeCastle();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);renderer.domElement.addEventListener('pointerdown',pointerDown);renderer.domElement.addEventListener('pointermove',pointerMove);renderer.domElement.addEventListener('pointerup',pointerUp);renderer.domElement.addEventListener('pointercancel',pointerUp);renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();viewDistance=THREE.MathUtils.clamp(viewDistance+e.deltaY*.01,7,20)},{passive:false});animate()}
function makeSky(){const g=new THREE.BufferGeometry(),p=[];for(let i=0;i<900;i++)p.push((Math.random()-.5)*180,Math.random()*130-10,(Math.random()-.5)*100-25);g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.16})))}
function makePlayer(){player=new THREE.Group();const body=new THREE.Mesh(new THREE.CapsuleGeometry(.48,.9,8,16),new THREE.MeshStandardMaterial({color:0x5f80ff}));body.position.y=1.05;body.castShadow=true;player.add(body);const head=new THREE.Mesh(new THREE.SphereGeometry(.45,20,16),new THREE.MeshStandardMaterial({color:0xffd1aa}));head.position.y=2;player.add(head);const hair=new THREE.Mesh(new THREE.SphereGeometry(.47,20,12,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0x3a211b}));hair.position.y=2.12;player.add(hair);[-.18,.18].forEach(x=>{const e=new THREE.Mesh(new THREE.SphereGeometry(.045,8,8),new THREE.MeshBasicMaterial({color:0x111111}));e.position.set(x,2.03,.42);player.add(e)});scene.add(player);player.position.set(0,0,0)}
function starGeometry(){const s=new THREE.Shape();for(let i=0;i<10;i++){const r=i%2?1.2:2.15,a=i*Math.PI/5-Math.PI/2,x=Math.cos(a)*r,y=Math.sin(a)*r;i?s.lineTo(x,y):s.moveTo(x,y)}s.closePath();return new THREE.ExtrudeGeometry(s,{depth:.5,bevelEnabled:true,bevelSize:.12,bevelThickness:.12,bevelSegments:2})}
function label(text){const c=document.createElement('canvas');c.width=512;c.height=150;const x=c.getContext('2d');x.fillStyle='rgba(25,13,75,.92)';x.roundRect(4,4,504,142,26);x.fill();x.strokeStyle='white';x.lineWidth=4;x.stroke();x.fillStyle='white';x.font='bold 36px Microsoft JhengHei';x.textAlign='center';x.textBaseline='middle';x.fillText(text,256,75,475);const t=new THREE.CanvasTexture(c),s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true}));s.scale.set(5.2,1.5,1);return s}
function makeLevel(){const base=new THREE.Mesh(new THREE.CylinderGeometry(3,3.5,.6,32),new THREE.MeshStandardMaterial({color:0x4c348e}));base.position.y=-.3;scene.add(base);for(let q=0;q<10;q++){const y=3.25+q*4.25,order=[0,1,2].sort(()=>Math.random()-.5);order.forEach((ans,j)=>{const x=(j-1)*4.8+(q%2?.45:-.45),group=new THREE.Group();const mesh=new THREE.Mesh(starGeometry(),new THREE.MeshStandardMaterial({color:[0xffd94f,0x67e1ff,0xff86cf][j],emissive:[0x765000,0x07506d,0x6b174a][j],emissiveIntensity:.5}));mesh.rotation.x=Math.PI/2;mesh.scale.set(.82,.82,.82);mesh.castShadow=true;group.add(mesh);const l=label(questions[q].a[ans]);l.position.set(0,1.25,0);group.add(l);group.position.set(x,y,0);scene.add(group);platforms.push({group,q,ans,x,y,surface:y+.22,halfWidth:2.25,answered:false})});if(q===2||q===5||q===8)makeGift(q%2?3:-3,y+2.1,q)}}
function makeGift(x,y,id){const g=new THREE.Group(),b=new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),new THREE.MeshStandardMaterial({color:0xffd65b,emissive:0x8c5600,emissiveIntensity:1}));g.add(b);const r=new THREE.Mesh(new THREE.TorusGeometry(.7,.08,10,30),new THREE.MeshBasicMaterial({color:0xffffff}));r.rotation.x=Math.PI/2;g.add(r);g.position.set(x,y,0);g.userData.giftId=id+1;scene.add(g);gifts.push(g)}
function makeCastle(){const g=new THREE.Group(),m=new THREE.MeshStandardMaterial({color:0xf4c8ff,emissive:0x4e276c,emissiveIntensity:.5});const b=new THREE.Mesh(new THREE.BoxGeometry(7,4,3),m);b.position.y=2;g.add(b);[-2.6,2.6].forEach(x=>{const t=new THREE.Mesh(new THREE.CylinderGeometry(1,1,6,10),m);t.position.set(x,3,0);g.add(t);const r=new THREE.Mesh(new THREE.ConeGeometry(1.4,2.8,10),new THREE.MeshStandardMaterial({color:0x6c64ff}));r.position.set(x,7.2,0);g.add(r)});const s=label('故事書城堡');s.position.set(0,5,1.7);g.add(s);g.position.set(0,46,0);scene.add(g)}
function setQuestion(){if(questionIndex>=10)return finish(true);const d=questions[questionIndex];$('qNum').textContent=questionIndex+1;$('bar').style.width=questionIndex*10+'%';$('question').innerHTML=d.q+'<div class="sub">跳上你認為正確的答案星星</div>';$('answers').innerHTML=d.a.map((a,i)=>'<span class="answerTag">'+String.fromCharCode(65+i)+'. '+a+'</span>').join('')}
function toast(t,ok=true){$('toast').textContent=t;$('toast').style.color=ok?'#9fffd4':'#ff9bad';$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}
function updateHearts(){$('hearts').textContent='♥ '.repeat(lives)+'♡ '.repeat(5-lives)}
function resetPlayer(){player.position.set(0,currentFloor,0);previousY=currentFloor;vy=0;onGround=true}
function checkLanding(){if(vy>0)return false;for(const p of platforms){if(p.q!==questionIndex||p.answered)continue;const insideX=Math.abs(player.position.x-p.x)<=p.halfWidth;const feetNow=player.position.y;const fallingAcross=previousY>=p.surface-.75&&feetNow<=p.surface+.75;const closeEnough=Math.abs(feetNow-p.surface)<=1.05;if(insideX&&(fallingAcross||closeEnough)){player.position.y=p.surface;vy=0;onGround=true;p.answered=true;if(p.ans===questions[questionIndex].c){score+=100;currentFloor=p.surface;questionIndex++;toast('答對了！進入下一題！');setQuestion()}else{lives--;updateHearts();toast('答錯了！失去一條生命！',false);p.group.visible=false;onGround=false;vy=-4;if(lives<=0)setTimeout(()=>finish(false),700)}return true}}return false}
function pointerDown(e){if(!started)return;dragging=true;dragStartX=lastX=e.clientX;dragStartY=lastY=e.clientY;dragDistance=0;document.body.classList.add('dragging');renderer.domElement.setPointerCapture?.(e.pointerId)}
function pointerMove(e){if(!dragging)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;dragDistance+=Math.abs(dx)+Math.abs(dy);viewYaw-=dx*.007;viewPitch=THREE.MathUtils.clamp(viewPitch+dy*.005,-.15,.85);lastX=e.clientX;lastY=e.clientY}
function pointerUp(e){if(!dragging)return;dragging=false;document.body.classList.remove('dragging');if(dragDistance<8)pickGiftAt(e.clientX,e.clientY)}
function pickGiftAt(clientX,clientY){const m=new THREE.Vector2(clientX/innerWidth*2-1,-(clientY/innerHeight*2-1)),ray=new THREE.Raycaster();ray.setFromCamera(m,camera);const h=ray.intersectObjects(gifts,true);if(!h.length)return;let g=h[0].object;while(g.parent&&!g.userData.giftId&&g.parent!==scene)g=g.parent;if(g.userData.taken)return;g.userData.taken=true;g.visible=false;const names=['翅膀模式','巨人模式','小貓模式'],n=Math.floor(Math.random()*3);activePower=n;powerUntil=performance.now()+60000;$('power').style.display='block';$('powerName').textContent='神秘能力：'+names[n];if(n===1)player.scale.set(1.55,1.55,1.55);if(n===2)player.children[0].material.color.set(0xff9a45);toast('獲得「'+names[n]+'」60 秒！')}
function updatePower(){if(activePower===null)return;const left=Math.max(0,Math.ceil((powerUntil-performance.now())/1000));$('timer').textContent=left+' 秒';if(!left){activePower=null;$('power').style.display='none';player.scale.set(1,1,1);player.children[0].material.color.set(0x5f80ff);toast('神秘能力結束了')}}
function updateCamera(){const target=new THREE.Vector3(player.position.x*.12,player.position.y+1,0);const horizontal=Math.cos(viewPitch)*viewDistance;const desired=new THREE.Vector3(target.x+Math.sin(viewYaw)*horizontal,target.y+Math.sin(viewPitch)*viewDistance+2,target.z+Math.cos(viewYaw)*horizontal);camera.position.lerp(desired,.1);camera.lookAt(target)}
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.035);if(started){previousY=player.position.y;const speed=activePower===1?8:6;if(keys.ArrowLeft)player.position.x-=speed*dt;if(keys.ArrowRight)player.position.x+=speed*dt;player.position.x=THREE.MathUtils.clamp(player.position.x,-8,8);if(keys.Space&&onGround){vy=activePower===0?17:14.5;onGround=false}vy-=22*dt;player.position.y+=vy*dt;checkLanding();if(currentFloor===0&&player.position.y<=0){player.position.y=0;vy=0;onGround=true}if(player.position.y<currentFloor-7){lives--;updateHearts();toast('掉下去了！失去一條生命',false);resetPlayer();if(lives<=0)finish(false)}updateCamera();gifts.forEach(g=>{g.rotation.y+=dt;g.children[1].rotation.z+=dt*2});updatePower()}else updateCamera();renderer.render(scene,camera)}
async function finish(win){if(!started)return;started=false;$('hud').classList.add('hide');$('end').classList.remove('hide');const sec=Math.round((Date.now()-startTime)/1000),correct=questionIndex;$('endTitle').textContent=win?'成功到達故事書城堡！':'冒險暫告一段落';$('resultText').innerHTML='姓名：'+escapeHtml($('name').value)+'<br>答對：'+correct+'/10 題<br>分數：'+score+' 分<br>剩餘生命：'+lives+'<br>時間：'+sec+' 秒';const body={姓名:$('name').value,分數:score,答對題數:correct+'/10',剩餘生命:lives,完成時間:sec+'秒',_subject:'星空熊抱大冒險成績：'+$('name').value};try{const r=await fetch('https://formsubmit.co/ajax/yuetki1999@gmail.com',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error();$('sendStatus').textContent='成績已提交至老師電郵。'}catch(e){$('sendStatus').textContent='自動提交未成功，請按下方按鈕傳送。';$('mailFallback').href='mailto:yuetki1999@gmail.com?subject='+encodeURIComponent('星空熊抱大冒險成績：'+$('name').value)+'&body='+encodeURIComponent('姓名：'+$('name').value+'\n答對：'+correct+'/10\n分數：'+score+'\n剩餘生命：'+lives+'\n時間：'+sec+'秒');$('mailFallback').classList.remove('hide')}}
function escapeHtml(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
$('play').onclick=()=>{if(!$('name').value.trim()){alert('請先輸入姓名');return}$('playerName').textContent=$('name').value.trim();$('start').classList.add('hide');$('hud').classList.remove('hide');started=true;startTime=Date.now();setQuestion()};$('retry').onclick=()=>location.reload();init();
</script>
</body>
</html>
