<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"><title>星空熊抱大冒險 v5</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090527;color:#fff;font-family:"Microsoft JhengHei",sans-serif}canvas{display:block}.hide{display:none!important}.overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:#090527ee}.card{width:min(600px,92vw);padding:32px;text-align:center;background:#17104eee;border:2px solid #ffffff35;border-radius:25px}.card h1{color:#ffe66d}.card input{width:100%;padding:14px;border-radius:14px;border:2px solid #8975e8;background:#0d0737;color:#fff;font-size:18px}.card button{margin-top:15px;padding:13px 26px;border:0;border-radius:999px;background:#ffe66d;font-weight:900;font-size:18px}.small{font-size:13px;opacity:.82}#hud{position:fixed;inset:0;z-index:5;pointer-events:none}.top{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between}.pill,#question,#controls,#power,#toast{background:#17104edd;border:1px solid #ffffff38;border-radius:15px}.pill{padding:9px 14px;font-weight:800}.hearts{color:#ff709d}#question{position:absolute;top:64px;left:50%;transform:translateX(-50%);width:min(800px,94vw);padding:13px;text-align:center;font-size:clamp(16px,2.2vw,22px);font-weight:900}.sub{font-size:13px;font-weight:400;opacity:.8}#controls{position:absolute;left:12px;bottom:12px;padding:9px 13px;line-height:1.7;font-size:13px}#power{position:absolute;right:12px;top:116px;padding:10px 14px;text-align:center;display:none}.timer{font-size:21px;color:#ffe66d;font-weight:900}#toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);padding:12px 20px;font-size:19px;font-weight:900;opacity:0}.show{opacity:1!important}#version{position:fixed;right:8px;bottom:5px;z-index:30;font:12px monospace;color:#ffffff88}</style></head><body><canvas id="game"></canvas><div id="version">v5.0</div><div id="start" class="overlay"><div class="card"><h1>星空熊抱大冒險</h1><p>答對後不會返回起點，而會繼續向上攀爬。</p><input id="name" placeholder="請輸入學生姓名"><button id="play">開始攀爬</button><p class="small">← → 移動｜空白鍵跳躍｜滑鼠點擊發光禮物</p></div></div><div id="hud" class="hide"><div class="top"><div class="pill">玩家：<span id="playerName"></span></div><div class="pill">第 <span id="qNum">1</span>/10 題</div><div id="hearts" class="pill hearts">♥ ♥ ♥ ♥ ♥</div></div><div id="question"></div><div id="toast"></div><div id="controls">← → 左右移動<br>空白鍵跳躍<br><span style="color:#ffe66d">點擊發光禮物取得道具</span></div><div id="power"><div id="powerName"></div><div id="timer" class="timer"></div></div></div><div id="end" class="overlay hide"><div class="card"><h1 id="endTitle"></h1><div id="resultText"></div><button onclick="location.reload()">再玩一次</button></div></div><script src="v5.js?v=5001"></script></body></html>
